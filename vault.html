<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Anarchy | Retro Vault</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        /* Base and Parallax Background */
        body {
            margin: 0; padding: 0;
            background: #050505 url('RadioAnarchyBackground.png') no-repeat center top fixed;
            background-size: cover; color: #fff;
            font-family: 'Courier New', Courier, monospace;
            text-align: center; overflow-x: hidden;
            opacity: 0; /* SECURE START */
            transition: opacity 0.4s ease-in;
        }

        /* Top UI Row */
        .top-ui-row {
            display: flex; justify-content: space-between; align-items: flex-start;
            width: 95%; max-width: 1600px; margin: 30px auto 30px auto;
        }

        #user-profile-box {
            background: rgba(15, 5, 10, 0.85); border: 2px solid #00ffcc; border-radius: 12px;
            padding: 20px; box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
            display: flex; flex-direction: column; gap: 15px; width: 320px; box-sizing: border-box;
        }
        .profile-header { display: flex; justify-content: space-between; align-items: flex-start; }
        #user-name { color: #fff; font-size: 1.3rem; font-weight: bold; text-shadow: 0 0 8px #fff; text-align: left; }
        #user-avatar { width: 65px; height: 65px; border-radius: 50%; border: 2px solid #ff0055; object-fit: cover; }
        #user-roles-container { display: flex; flex-direction: column; gap: 6px; text-align: left; }
        .role-badge {
            font-size: 0.85rem; font-weight: bold; background: rgba(0, 0, 0, 0.6);
            padding: 5px 10px; border-radius: 4px; border-left: 4px solid #00ffcc; 
            color: #ddd; text-shadow: 0 0 5px rgba(255,255,255,0.3);
        }

        /* Hub Nav Dropdown */
        .hub-nav-wrapper { position: relative; display: inline-block; text-align: right; }
        .nav-trigger-btn {
            background: rgba(15, 5, 10, 0.9); border: 2px solid #ff0055; color: #ff0055;
            padding: 15px 30px; font-size: 1.2rem; font-weight: bold; letter-spacing: 2px;
            border-radius: 8px; cursor: pointer; text-shadow: 0 0 10px rgba(255, 0, 85, 0.5);
            transition: all 0.3s ease;
        }
        .nav-trigger-btn:hover { background: #ff0055; color: #000; box-shadow: 0 0 25px #ff0055; }
        .dropdown-content {
            display: none; position: absolute; right: 0; top: 110%;
            background: rgba(5, 5, 8, 0.98); border: 2px solid #00ffcc; border-radius: 8px;
            min-width: 280px; z-index: 1000; text-align: left; flex-direction: column;
        }
        .hub-nav-wrapper:hover .dropdown-content { display: flex; }
        .drop-link { color: #fff; padding: 12px 20px; text-decoration: none; border-bottom: 1px dashed #333; }
        .drop-link:hover { background: rgba(0, 255, 204, 0.15); color: #00ffcc; }

        /* Vault Header Stack */
        .vault-header { display: flex; flex-direction: column; align-items: center; margin-bottom: 60px; }
        .header-main { width: 550px; z-index: 2; filter: drop-shadow(0 0 15px #ff0055); }
        .header-sub { width: 480px; margin-top: -35px; z-index: 1; filter: drop-shadow(0 0 10px #00ffcc); }

        /* The Grid */
        .vault-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px;
            width: 90%; max-width: 1550px; margin: 0 auto 80px auto;
        }
        .column { border: 2px solid red; padding: 30px; display: flex; flex-direction: column; gap: 45px; border-radius: 12px; }

        /* Slot Styling */
        .system-slot { display: flex; flex-direction: column; align-items: center; text-decoration: none; transition: transform 0.2s ease; }
        .system-slot:hover { transform: scale(1.1); }
        .system-logo { width: 190px; z-index: 2; }
        .system-console { width: 170px; margin-top: -28px; z-index: 1; }
    </style>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // Parallax Engine
            window.addEventListener('scroll', () => {
                document.body.style.backgroundPositionY = -(window.pageYOffset * 0.3) + 'px';
            });

            // Security & Auth Check
            fetch('https://api.radioanarchy.gg:8202/auth/me', { credentials: 'include' })
                .then(res => res.json())
                .then(data => {
                    if (!data.loggedIn) {
                        window.location.href = 'index.html';
                    } else {
                        document.body.style.opacity = '1';
                        document.getElementById('user-name').innerText = data.displayUsername;
                        document.getElementById('user-avatar').src = data.displayAvatar || 'default-avatar.png';
                        const container = document.getElementById('user-roles-container');
                        if (data.roles) {
                            data.roles.forEach(role => {
                                const b = document.createElement('div');
                                b.className = 'role-badge';
                                b.style.borderLeftColor = role.color || '#00ffcc';
                                b.innerText = role.name;
                                container.appendChild(b);
                            });
                        }
                    }
                }).catch(() => { window.location.href = 'index.html'; });
        });
    </script>
</head>
