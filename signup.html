<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Anarchy | Enlist</title>
    <link rel="icon" type="image/png" href="favicon.png">
    </head>
<body>
    <div class="auth-container">
        <img src="radioanarchylogo.png" alt="Radio Anarchy Logo" class="auth-main-logo">
        
        <div class="form-box">
            <h2 class="form-header">NEW ANARCHIST REGISTRATION</h2>
            
            <div class="fast-track">
                <div class="social-auth-row">
                    <a href="#" class="social-btn discord-btn">
                        <img src="discordlogo.png" alt="Discord" class="social-icon">
                        <span>Discord</span>
                    </a>
                    <a href="#" class="social-btn google-btn">
                        <img src="googlelogo.png" alt="Google" class="social-icon">
                        <span>Google</span>
                    </a>
                </div>
                <p class="divider"><span>// OR MANUAL OVERRIDE //</span></p>
            </div>

            <form action="#" method="POST" class="anarchy-form">
                <div class="input-group">
                    <label for="username">USERNAME</label>
                    <input type="text" id="username" name="username" placeholder="Enter your callsign" required>
                </div>
                
                <div class="input-group">
                    <label for="email">EMAIL ADDRESS</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>
                
                <div class="input-group">
                    <label for="password">PASSWORD</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
                
                <div class="input-group">
                    <label for="confirm_password">CONFIRM PASSWORD</label>
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="submit-btn">JOIN THE HUB</button>
            </form>
            
            <div class="form-footer">
                <p>Already a member? <a href="signin.html">Access the Terminal</a></p>
                <p><a href="index.html">Return to Main Hub</a></p>
            </div>
        </div>
    </div>
</body>
</html>
