<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Anarchy | Enlist</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        /* Base and Background */
        body {
            margin: 0;
            padding: 0;
            background: #050505 url('RadioAnarchyBackground.png') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .auth-container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            text-align: center;
            margin-top: 40px;
            margin-bottom: 40px;
        }

        .auth-main-logo {
            width: 100%;
            max-width: 400px;
            margin-bottom: 30px;
            filter: drop-shadow(0 0 15px rgba(255, 0, 85, 0.5));
        }

        /* The Sign-Up Box */
        .form-box {
            background: rgba(15, 5, 10, 0.85);
            border: 2px solid #ff0055;
            border-radius: 12px;
            padding: 40px 30px;
            box-shadow: 0 0 30px rgba(255, 0, 85, 0.3), inset 0 0 20px rgba(255, 0, 85, 0.1);
        }

        .form-header {
            color: #00ffcc;
            font-size: 1.6rem;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #00ffcc;
            margin-top: 0;
            margin-bottom: 30px;
            border-bottom: 1px dashed #555;
            padding-bottom: 15px;
        }

        /* Fast Track Social Buttons */
        .social-auth-row {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .social-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            color: #fff;
            transition: all 0.3s ease;
        }

        .discord-btn {
            background: #5865F2;
            border: 1px solid #4752C4;
        }
        .discord-btn:hover {
            background: #4752C4;
            box-shadow: 0 0 15px rgba(88, 101, 242, 0.6);
            transform: scale(1.02);
        }

        .google-btn {
            background: #111;
            border: 1px solid #444;
        }
        .google-btn:hover {
            background: #222;
            border-color: #00ffcc;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.3);
            transform: scale(1.02);
        }

        .social-icon {
            width: 24px;
            height: 24px;
        }

        /* Divider */
        .divider {
            color: #ff0055;
            font-size: 0.9rem;
            letter-spacing: 2px;
            margin: 20px 0;
        }

        /* Form Input Fields */
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            color: #00ffcc;
            font-size: 0.9rem;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.6);
            border: 1px dashed #555;
            color: #fff;
            padding: 12px;
            border-radius: 5px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: #00ffcc;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
            background: rgba(0, 20, 40, 0.5);
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            background: transparent;
            color: #ff0055;
            border: 2px solid #ff0055;
            padding: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 2px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Courier New', Courier, monospace;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background: #ff0055;
            color: #fff;
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.6);
        }

        /* Footer Links */
        .form-footer {
            margin-top: 25px;
            font-size: 0.9rem;
        }

        .form-footer p {
            margin: 10px 0;
        }

        .form-footer a {
            color: #00ffcc;
            text-decoration: none;
        }

        .form-footer a:hover {
            text-decoration: underline;
            text-shadow: 0 0 8px #00ffcc;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <img src="radioanarchylogo.png" alt="Radio Anarchy Logo" class="auth-main-logo">
        
        <div class="form-box">
            <h2 class="form-header">NEW ANARCHIST REGISTRATION</h2>
            
            <div class="fast-track">
                <div class="social-auth-row">
                    <a href="#" class="social-btn discord-btn">
                        <img src="discordlogo.png" alt="Discord" class="social-icon">
                        <span>Discord</span>
                    </a>
                    <a href="#" class="social-btn google-btn">
                        <img src="googlelogo.png" alt="Google" class="social-icon">
                        <span>Google</span>
                    </a>
                </div>
                <p class="divider"><span>// OR MANUAL OVERRIDE //</span></p>
            </div>

            <form action="#" method="POST" class="anarchy-form">
                <div class="input-group">
                    <label for="username">USERNAME</label>
                    <input type="text" id="username" name="username" placeholder="Enter your callsign" required>
                </div>
                
                <div class="input-group">
                    <label for="email">EMAIL ADDRESS</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>
                
                <div class="input-group">
                    <label for="password">PASSWORD</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
                
                <div class="input-group">
                    <label for="confirm_password">CONFIRM PASSWORD</label>
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="submit-btn">JOIN THE HUB</button>
            </form>
            
            <div class="form-footer">
                <p>Already a member? <a href="signin.html">Access the Terminal</a></p>
                <p><a href="index.html">Return to Main Hub</a></p>
            </div>
        </div>
    </div>
</body>
</html>
