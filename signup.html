<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Anarchy | Enlist</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        /* Base and Background */
        body {
            margin: 0;
            padding: 0;
            background: #050505 url('RadioAnarchyBackground.png') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .auth-container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            text-align: center;
            margin-top: 40px;
            margin-bottom: 40px;
        }

        .auth-main-logo {
            width: 100%;
            max-width: 400px;
            margin-bottom: 30px;
            filter: drop-shadow(0 0 15px rgba(255, 0, 85, 0.5));
        }

        /* The Sign-Up Box */
        .form-box {
            background: rgba(15, 5, 10, 0.85);
            border: 2px solid #ff0055;
            border-radius: 12px;
            padding: 40px 30px;
            box-shadow: 0 0 30px rgba(255, 0, 85, 0.3), inset 0 0 20px rgba(255, 0, 85, 0.1);
        }

        .form-header {
            color: #00ffcc;
            font-size: 1.6rem;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #00ffcc;
            margin-top: 0;
            margin-bottom: 30px;
            border-bottom: 1px dashed #555;
            padding-bottom: 15px;
        }

        /* --- Social Buttons: Unified 1-column layout --- */
        .social-auth-row {
            display: flex;
            flex-direction: column; 
            align-items: center;    
            gap: 15px;              
            margin-bottom: 25px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            color: #fff;
            transition: all 0.3s ease; 
            border: 2px solid transparent;
            
            width: 75%;
            box-sizing: border-box; 
        }

        /* Hover: Red Glow, Outline, and "Rising" Effect */
        .social-btn:hover {
            border: 2px solid #ff0055;
            box-shadow: 0 0 20px #ff0055, inset 0 0 8px #ff0055;
            
            /* Social specific action: scale up slightly AND lift */
            transform: scale(1.04) translateY(-4px); 
        }

        /* Specific Button Colors */
        .discord-btn { background: #5865F2; }
        .github-btn { background: #24292e; }
        .google-btn { background: #111; border-color: #444; }

        .social-icon { width: 22px; height: 22px; }

        /* Divider */
        .divider {
            color: #ff0055;
            font-size: 0.9rem;
            letter-spacing: 2px;
            margin: 25px 0;
        }

        /* Input Fields */
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; color: #00ffcc; font-size: 0.9rem; font-weight: bold; margin-bottom: 8px; }
        .input-group input {
            width: 100%; box-sizing: border-box; background: rgba(0, 0, 0, 0.6);
            border: 1px dashed #555; color: #fff; padding: 12px; border-radius: 5px;
            font-family: 'Courier New', Courier, monospace; outline: none; transition: 0.3s;
        }
        .input-group input:focus { border-color: #00ffcc; box-shadow: 0 0 10px rgba(0, 255, 204, 0.3); }

        /* --- Reusable Anarchy Action Button (Modified with Raise) --- */
        .anarchy-action-btn {
            background: none; border: none; padding: 0; cursor: pointer;
            display: flex; justify-content: center; width: 100%;
            transition: transform 0.2s ease, filter 0.3s ease; /* Added transition for raise/glow */
            outline: none; margin-top: 15px;
        }

        .anarchy-action-btn img {
            width: 100%; 
            max-width: 310px; /* Reduced Size (~30% reduction) */
            height: auto;
            transition: filter 0.3s ease;
        }

        /* Hover: Red Lighting AND "Rising" Effect */
        .anarchy-action-btn:hover {
            /* The physical rising action added to the container */
            transform: translateY(-4px); 
        }
        
        .anarchy-action-btn:hover img {
            /* The visual lighting added to the image */
            filter: drop-shadow(0 0 15px #ff0055) brightness(1.2);
        }

        /* Click Animation (tactile feel) */
        .anarchy-action-btn:active { 
            /* Added scaling here for click feedback */
            transform: scale(0.96) translateY(-2px); 
        }

        /* Footer Links */
        .form-footer { margin-top: 25px; font-size: 0.9rem; }
        .form-footer a { color: #00ffcc; text-decoration: none; }
        .form-footer a:hover { text-shadow: 0 0 8px #00ffcc; }
    </style>
</head>
<body>
    <div class="auth-container">
        <img src="radioanarchylogo.png" alt="Radio Anarchy Logo" class="auth-main-logo">
        
        <div class="form-box">
            <h2 class="form-header">NEW ANARCHIST REGISTRATION</h2>
            
            <div class="fast-track">
                <div class="social-auth-row">
                    <a href="https://api.radioanarchy.gg:8202/auth/discord" class="social-btn discord-btn">
                        <img src="discordlogo.png" alt="Discord" class="social-icon">
                        <span>Discord</span>
                    </a>
                    <a href="https://api.radioanarchy.gg:8202/auth/github" class="social-btn github-btn">
                        <img src="Githublogo.png" alt="GitHub" class="social-icon">
                        <span>GitHub</span>
                    </a>
                    <a href="https://api.radioanarchy.gg:8202/auth/google" class="social-btn google-btn">
                        <img src="googlelogo.png" alt="Google" class="social-icon">
                        <span>Google</span>
                    </a>
                </div>
                <p class="divider"><span>// OR MANUAL OVERRIDE //</span></p>
            </div>

            <form id="registrationForm">
                <div class="input-group">
                    <label for="username">USERNAME</label>
                    <input type="text" id="username" name="username" placeholder="Enter your callsign" required>
                </div>
                <div class="input-group">
                    <label for="email">EMAIL ADDRESS</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>
                <div class="input-group">
                    <label for="avatar">PROFILE PICTURE (Optional)</label>
                    <input type="file" id="avatar" name="avatar" accept="image/png, image/jpeg, image/gif">
                </div>
                <div class="input-group">
                    <label for="password">PASSWORD</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
                <div class="input-group">
                    <label for="confirm_password">CONFIRM PASSWORD</label>
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="anarchy-action-btn">
                    <img src="submit.png" alt="Submit">
                </button>
            </form>
            
            <div class="form-footer">
                <p>Already a member? <a href="signin.html">Access the Terminal</a></p>
                <p><a href="index.html">Return to Main Hub</a></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('registrationForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            
            // Basic password check
            if(formData.get('password') !== formData.get('confirm_password')) {
                alert("ERROR: Passwords do not match.");
                return;
            }

            try {
                // Send the data over the secure tunnel
                const response = await fetch('https://api.radioanarchy.gg:8202/auth/register', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();
                
                if (response.ok) {
                    alert("Welcome to the Hub, Anarchist! Enlistment successful.");
                    window.location.href = 'signin.html'; // Redirect to login
                } else {
                    alert("ENLISTMENT FAILED: " + result.error);
                }
            } catch (err) {
                console.error("Connection Error:", err);
                alert("CRITICAL ERROR: The Secure Terminal is offline.");
            }
        });
    </script>
</body>
</html>
