<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Anarchy | Player Profile</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        /* --- GLOBAL AESTHETIC --- */
        body {
            margin: 0;
            padding: 0;
            background: #050505 url('RadioAnarchyBackground.png') no-repeat center top fixed;
            background-size: cover;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .terminal-container {
            background: rgba(15, 5, 10, 0.92);
            border: 2px solid #ff0055;
            border-radius: 12px;
            padding: 40px;
            width: 90%;
            max-width: 700px;
            box-shadow: 0 0 30px rgba(255, 0, 85, 0.3), inset 0 0 15px rgba(0, 0, 0, 0.5);
            position: relative;
            text-align: center;
        }

        /* --- HEADER --- */
        .profile-banner {
            width: 100%;
            max-width: 450px;
            margin: 0 auto 30px auto;
            display: block;
        }

        /* --- SECTION BOXES --- */
        .mixer-box {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #333;
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 30px;
            box-shadow: inset 0 0 10px rgba(0, 255, 204, 0.05);
        }

        .section-title {
            color: #00ffcc;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 20px;
            font-size: 1.1rem;
            text-shadow: 0 0 8px #00ffcc;
        }

        /* --- FORM ELEMENTS --- */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            color: #aaa;
            font-size: 0.8rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        select, input[type="file"] {
            background: #000;
            border: 1px solid #00ffcc;
            color: #fff;
            padding: 12px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            outline: none;
        }

        .avatar-preview-wrapper {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: 10px;
        }

        #current-avatar-preview {
            width: 80px;
            height: 80px;
            border: 2px solid #00ffcc;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
        }

        /* --- BUTTON ANIMATIONS --- */
        .btn-animate {
            transition: transform 0.2s, filter 0.2s;
            cursor: pointer;
        }

        .btn-animate:hover {
            transform: translateY(-5px);
            filter: drop-shadow(0 0 12px #00ffcc);
        }

        .btn-animate:active {
            transform: translateY(2px) scale(0.95);
            filter: brightness(1.5) hue-rotate(90deg);
        }

        .submit-btn {
            width: 220px;
            margin: 20px auto 0 auto;
            display: block;
        }

        /* --- SOCIAL CONNECTION MATRIX --- */
        .matrix-grid {
            display: flex;
            justify-content: center;
            gap: 30px;
            min-height: 80px;
            align-items: center;
        }

        .connection-unit {
            position: relative;
            width: 60px;
            height: 60px;
        }

        .social-icon {
            width: 60px;
            height: 60px;
            display: block;
        }

        /* --- TOOLTIP STYLING --- */
        .tooltip {
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            background: #000;
            color: #fff;
            border: 1px solid #00ffcc;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 0.75rem;
            width: 200px;
            text-align: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            z-index: 100;
            box-shadow: 0 5px 15px rgba(0,0,0,0.8);
        }

        .connection-unit:hover .tooltip {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(20px);
        }

        /* --- NAVIGATION --- */
        .home-btn-container {
            margin-top: 40px;
        }

        .home-btn {
            width: 100px; /* Scaled up as requested */
        }

        /* Hidden State */
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="terminal-container">
        <!-- Header Banner -->
        <img src="playerprofilelogo.png" class="profile-banner" alt="Player Profile">

        <!-- Identity Mixer -->
        <div class="mixer-box">
            <div class="section-title">Identity Mixer</div>
            
            <div class="form-group">
                <label>Select Active Username</label>
                <select id="username-mixer">
                    <!-- Dynamically Populated -->
                </select>
            </div>

            <div class="form-group">
                <label>Active Avatar Preview</label>
                <div class="avatar-preview-wrapper">
                    <img id="current-avatar-preview" src="default-avatar.png" alt="Preview">
                    <div style="flex-grow: 1;">
                        <label style="margin-bottom: 5px; display: block;">Upload Custom Hub Avatar</label>
                        <input type="file" id="hub-avatar-upload" accept="image/*">
                    </div>
                </div>
            </div>

            <img src="submit.png" class="btn-animate submit-btn" id="submit-mixer" alt="Update Terminal">
        </div>

        <!-- Connection Matrix -->
        <div class="mixer-box">
            <div class="section-title">Secure Connections</div>
            <div class="matrix-grid" id="matrix-grid">
                <!-- Discord -->
                <div class="connection-unit" id="unit-discord">
                    <a href="https://api.radioanarchy.gg:8202/auth/discord">
                        <img src="discordlogo.png" class="btn-animate social-icon">
                    </a>
                    <div class="tooltip">Click here to secure your Discord data to your Hub identity.</div>
                </div>

                <!-- Google -->
                <div class="connection-unit" id="unit-google">
                    <a href="https://api.radioanarchy.gg:8202/auth/google">
                        <img src="googlelogo.png" class="btn-animate social-icon">
                    </a>
                    <div class="tooltip">Click here to secure your Google data to your Hub identity.</div>
                </div>

                <!-- GitHub -->
                <div class="connection-unit" id="unit-github">
                    <a href="https://api.radioanarchy.gg:8202/auth/github">
                        <img src="githublogo.png" class="btn-animate social-icon">
                    </a>
                    <div class="tooltip">Click here to secure your GitHub data to your Hub identity.</div>
                </div>
            </div>
        </div>

        <!-- Exit Navigation -->
        <div class="home-btn-container">
            <a href="index.html">
                <img src="home.png" class="btn-animate home-btn" alt="Home">
            </a>
        </div>
    </div>

    <script>
        const API = "https://api.radioanarchy.gg:8202";
        let unlockedData = {};

        // 1. AUTH CHECK & INITIALIZE
        async function init() {
            try {
                const res = await fetch(`${API}/auth/me`, { credentials: 'include' });
                const data = await res.json();

                if (!data.loggedIn) {
                    window.location.href = 'index.html';
                    return;
                }

                unlockedData = data.unlocked;

                // Update Preview
                document.getElementById('current-avatar-preview').src = data.currentAvatar || 'default-avatar.png';

                // 2. POPULATE USERNAME MIXER
                const mixer = document.getElementById('username-mixer');
                mixer.innerHTML = ''; // Clear

                for (const [provider, info] of Object.entries(unlockedData)) {
                    if (info && info.username) {
                        const opt = document.createElement('option');
                        opt.value = provider;
                        opt.innerText = info.username + ` (${provider.toUpperCase()})`;
                        if (data.activePersona === provider) opt.selected = true;
                        mixer.appendChild(opt);
                    }
                }

                // 3. UPDATE CONNECTION MATRIX
                // If connected (true), hide the button.
                if (data.connections.discord) document.getElementById('unit-discord').classList.add('hidden');
                if (data.connections.google) document.getElementById('unit-google').classList.add('hidden');
                if (data.connections.github) document.getElementById('unit-github').classList.add('hidden');

            } catch (err) {
                console.error("Terminal Error:", err);
            }
        }

        // --- CLIENT SIDE VALIDATION ---
        document.getElementById('hub-avatar-upload').onchange = function() {
            if (this.files[0] && this.files[0].size > 2097152) { 
                alert("FILE TOO LARGE: Access denied. (Max 2MB)"); 
                this.value = ""; 
            }
        };

        // --- SUBMIT IDENTITY MIXER ---
        document.getElementById('submit-mixer').onclick = async () => {
            const selectedPersona = document.getElementById('username-mixer').value;
            const fileInput = document.getElementById('hub-avatar-upload');
            
            const formData = new FormData();
            formData.append('active_persona', selectedPersona);
            
            if (fileInput.files[0]) {
                formData.append('avatar', fileInput.files[0]);
                // If user uploads a file, we force persona to manual so the new avatar shows
                formData.set('active_persona', 'manual');
            }

            try {
                const res = await fetch(`${API}/profile/update`, {
                    method: 'POST',
                    credentials: 'include',
                    body: formData
                });

                if (res.ok) {
                    alert("IDENTITY RECONFIGURED: Terminal Updated.");
                    window.location.reload();
                } else {
                    alert("UPDATE FAILED: Check system logs.");
                }
            } catch (err) {
                console.error("Submit error:", err);
            }
        };

        // Parallax Background Effect
        window.addEventListener('scroll', function() {
            const scrollPosition = window.pageYOffset;
            document.body.style.backgroundPositionY = -(scrollPosition * 0.3) + 'px';
        });

        init();
    </script>
</body>
</html>
