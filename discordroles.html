<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Anarchy | Discord Roles</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        /* --- GLOBAL THEME --- */
        body {
            margin: 0;
            padding: 0;
            background: #050505 url('RadioAnarchyBackground.png') no-repeat center top fixed;
            background-size: cover;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            overflow-x: hidden;
            padding-bottom: 50px;
        }

        /* --- HEADER & COMMAND CENTER --- */
        .top-header-area {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 30px 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Profile Box (Top Left) */
        #user-profile-box {
            background: rgba(15, 5, 10, 0.85);
            border: 2px solid #00ffcc;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 320px;
            box-sizing: border-box;
            text-align: left;
        }

        .profile-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        #user-name {
            color: #fff;
            font-size: 1.3rem;
            font-weight: bold;
            text-shadow: 0 0 8px #fff;
            word-break: break-all;
            margin-right: 10px;
            margin-top: 5px;
        }

        #user-avatar {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            border: 2px solid #ff0055;
            object-fit: cover;
            flex-shrink: 0;
        }

        #user-roles-container {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 5px;
        }

        .role-badge {
            font-size: 0.85rem;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.6);
            padding: 5px 10px;
            border-radius: 4px;
            border-left: 4px solid #00ffcc; 
            color: #ddd;
            text-shadow: 0 0 5px rgba(255,255,255,0.3);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Logo Stack (Top Center) */
        .logo-stack {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            flex-grow: 1;
            margin-right: 320px; /* Balances the flex space against the profile box */
        }

        .main-discord-logo {
            width: 100%;
            max-width: 450px;
            filter: drop-shadow(0 0 15px rgba(88, 101, 242, 0.5));
        }

        .sub-discord-logo {
            width: 100%;
            max-width: 300px;
            filter: drop-shadow(0 0 10px #ff0055);
        }

        /* --- THEME CONTENT BOXES --- */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 50px;
            padding: 0 20px;
        }

        .theme-box {
            background: rgba(15, 5, 10, 0.85);
            border: 2px solid #ff0055;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 0 30px rgba(255, 0, 85, 0.2), inset 0 0 15px rgba(0, 0, 0, 0.8);
            text-align: left;
        }

        .box-header {
            color: #00ffcc;
            font-size: 1.8rem;
            letter-spacing: 3px;
            text-shadow: 0 0 10px #00ffcc;
            margin-top: 0;
            margin-bottom: 30px;
            border-bottom: 1px dashed #555;
            padding-bottom: 15px;
            text-align: center;
        }

        /* --- GRID & FORM LAYOUTS --- */
        .role-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.6);
            padding: 12px 15px;
            border-radius: 6px;
            border: 1px solid #333;
            transition: all 0.2s;
        }

        .checkbox-wrapper:hover {
            border-color: #00ffcc;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.2);
        }

        .checkbox-wrapper input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #ff0055;
        }

        .checkbox-wrapper label {
            color: #ddd;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 1px;
            user-select: none;
        }

        /* Form Inputs */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 25px;
        }

        .form-group label {
            color: #00ffcc;
            font-size: 1rem;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .form-input {
            background: rgba(0, 0, 0, 0.7);
            border: 1px dashed #555;
            color: #fff;
            padding: 15px;
            border-radius: 6px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        .form-input:focus {
            border-color: #00ffcc;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
        }

        input[type="file"].form-input {
            padding: 10px;
        }

        textarea.form-input {
            resize: vertical;
            min-height: 100px;
        }

        /* --- SUBMIT BUTTONS --- */
        .btn-right-align {
            display: flex;
            justify-content: flex-end;
            margin-top: 10px;
        }

        .btn-submit {
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            transition: transform 0.2s, filter 0.2s;
            outline: none;
        }

        .btn-submit img {
            width: 180px;
            display: block;
        }

        .btn-submit:hover {
            transform: translateY(-4px);
            filter: drop-shadow(0 0 15px #00ffcc);
        }

        .btn-submit:active {
            transform: scale(0.95);
        }

        /* Back Button */
        .back-btn-wrapper {
            margin-top: 60px;
            display: flex;
            justify-content: center;
        }

        .btn-home {
            width: 120px;
            transition: transform 0.2s, filter 0.2s;
        }

        .btn-home:hover {
            transform: scale(1.1);
            filter: drop-shadow(0 0 15px #ff0055);
        }

        @media (max-width: 1000px) {
            .top-header-area { flex-direction: column; align-items: center; gap: 40px; }
            .logo-stack { margin-right: 0; }
        }

        /* --- CUSTOM NOTIFICATION ENGINE --- */
        #ra-notification {
            position: fixed;
            bottom: -150px; /* Hidden off-screen by default */
            right: 20px;
            width: 350px;
            background: rgba(15, 5, 10, 0.95);
            border: 2px solid #ff0055;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.4);
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            z-index: 9999;
            transition: bottom 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            font-family: 'Courier New', Courier, monospace;
        }

        #ra-notification.show-notif {
            bottom: 20px; 
        }

        #ra-notif-gif {
            width: 60px;
            height: 60px;
            border-radius: 4px;
            object-fit: cover;
            border: 1px solid #00ffcc;
        }

        .ra-notif-content {
            display: flex;
            flex-direction: column;
            gap: 5px;
            text-align: left;
        }

        #ra-notif-title {
            margin: 0;
            color: #00ffcc;
            font-size: 1.1rem;
            letter-spacing: 1px;
            text-shadow: 0 0 5px #00ffcc;
        }

        #ra-notif-message {
            margin: 0;
            color: #ddd;
            font-size: 0.85rem;
            line-height: 1.3;
        }
    </style>
</head>
<body>

    <div class="top-header-area">
        <div id="user-profile-box" style="display: none;">
            <div class="profile-header">
                <span id="user-name"></span>
                <img id="user-avatar" src="" alt="Anarchist Avatar">
            </div>
            <div id="user-roles-container"></div>
        </div>

        <div class="logo-stack">
            <img src="discordlogo.png" alt="Discord" class="main-discord-logo">
            <img src="discordroles.png" alt="Roles" class="sub-discord-logo">
        </div>
    </div>

    <div class="container">

        <div class="theme-box">
            <h2 class="box-header">SELECTABLE ROLES</h2>
            <form id="form-selectable-roles">
                <div class="role-grid">
                    <div class="checkbox-wrapper"><input type="checkbox" id="role-dayz" value="1475248679463157945"> <label for="role-dayz">DayZ</label></div>
                    <div class="checkbox-wrapper"><input type="checkbox" id="role-vein" value="1475252236350390393"> <label for="role-vein">Vein</label></div>
                    <div class="checkbox-wrapper"><input type="checkbox" id="role-beamng" value="1475253102310592602"> <label for="role-beamng">BeamNG</label></div>
                    <div class="checkbox-wrapper"><input type="checkbox" id="role-gta" value="1485639523822997524"> <label for="role-gta">5M - GTA</label></div>
                    <div class="checkbox-wrapper"><input type="checkbox" id="role-7dtd" value="1490876830247424070"> <label for="role-7dtd">7 Days to Die</label></div>
                    <div class="checkbox-wrapper"><input type="checkbox" id="role-valheim" value="1486367138997338162"> <label for="role-valheim">Valheim</label></div>
                    <div class="checkbox-wrapper"><input type="checkbox" id="role-mtg" value="1485639841562492948"> <label for="role-mtg">MTG</label></div>
                    <div class="checkbox-wrapper"><input type="checkbox" id="role-yugioh" value="1485640077643350202"> <label for="role-yugioh">Yugioh!</label></div>
                    <div class="checkbox-wrapper"><input type="checkbox" id="role-pokemon" value="1485640314189512916"> <label for="role-pokemon">Pokemon</label></div>
                    <div class="checkbox-wrapper"><input type="checkbox" id="role-dnd" value="1485640514899284149"> <label for="role-dnd">Dungeons & Dragons</label></div>
                    <div class="checkbox-wrapper"><input type="checkbox" id="role-retro" value="1485641794887618700"> <label for="role-retro">RetroArch</label></div>
                </div>
                <div class="btn-right-align">
                    <button type="submit" class="btn-submit"><img src="submit.png" alt="Submit"></button>
                </div>
            </form>
        </div>

        <div class="theme-box">
            <h2 class="box-header">APPLICABLE ROLES</h2>
            <form id="form-applicable-roles">
                <div class="role-grid">
                    <div class="checkbox-wrapper"><input type="checkbox" id="app-og" value="1476869411972583556"> <label for="app-og">Radio Anarchy OG</label></div>
                    <div class="checkbox-wrapper"><input type="checkbox" id="app-creator" value="1464113927431389358"> <label for="app-creator">Creator</label></div>
                    <div class="checkbox-wrapper"><input type="checkbox" id="app-owner" value="1464112315988185311"> <label for="app-owner">Server Owner</label></div>
                    <div class="checkbox-wrapper"><input type="checkbox" id="app-prof" value="1485607117699416246"> <label for="app-prof">Professor</label></div>
                    <div class="checkbox-wrapper"><input type="checkbox" id="app-modder" value="1485607636727500982"> <label for="app-modder">Modder</label></div>
                    <div class="checkbox-wrapper"><input type="checkbox" id="app-admin" value="1485607859294306344"> <label for="app-admin">Cert. Game Admin</label></div>
                </div>

                <div class="form-group">
                    <label>Upload any credentials</label>
                    <input type="file" name="credential" class="form-input">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="contactEmail" class="form-input" placeholder="Enter your contact email" required>
                </div>
                <div class="form-group">
                    <label>Social or Discord Links</label>
                    <input type="text" name="links" class="form-input" placeholder="Links to your work or server...">
                </div>
                <div class="form-group">
                    <label>Anything you would like us to know?</label>
                    <textarea name="info" class="form-input" placeholder="Tell us why you are applying..."></textarea>
                </div>

                <div class="btn-right-align">
                    <button type="submit" class="btn-submit"><img src="submit.png" alt="Submit"></button>
                </div>
            </form>
        </div>

        <div class="theme-box">
            <h2 class="box-header">JOIN THE RADIO ANARCHY STAFF</h2>
            <form id="form-staff">
                <div class="role-grid">
                    <div class="checkbox-wrapper"><input type="checkbox" id="staff-head" value="1439630953222897815"> <label for="staff-head">Head Admin</label></div>
                    <div class="checkbox-wrapper"><input type="checkbox" id="staff-admin" value="1365104351202250914"> <label for="staff-admin">Admin</label></div>
                    <div class="checkbox-wrapper"><input type="checkbox" id="staff-social" value="1365104357472862228"> <label for="staff-social">Social Media Director</label></div>
                </div>

                <div class="form-group">
                    <label>Upload any credentials</label>
                    <input type="file" name="credential" class="form-input">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="contactEmail" class="form-input" placeholder="Enter your contact email" required>
                </div>
                <div class="form-group">
                    <label>Social or Discord Links</label>
                    <input type="text" name="links" class="form-input" placeholder="Links to your portfolio or socials...">
                </div>
                <div class="form-group">
                    <label>Anything you would like us to know?</label>
                    <textarea name="info" class="form-input" placeholder="Why do you want to join the staff team?"></textarea>
                </div>

                <div class="btn-right-align">
                    <button type="submit" class="btn-submit"><img src="submit.png" alt="Submit"></button>
                </div>
            </form>
        </div>

        <div class="back-btn-wrapper">
            <a href="index.html">
                <img src="home.png" alt="Home" class="btn-home">
            </a>
        </div>

        <div id="ra-notification" class="ra-notification-hidden">
            <img id="ra-notif-gif" src="" alt="Notification Icon">
            <div class="ra-notif-content">
                <h3 id="ra-notif-title">SYSTEM ALERT</h3>
                <p id="ra-notif-message">Message goes here.</p>
            </div>
        </div>

    </div>

    <script>
        // --- CUSTOM SYSTEM NOTIFICATION ENGINE ---
        function showNotification(title, message, gifName, audioName) {
            const notifBox = document.getElementById('ra-notification');
            const notifTitle = document.getElementById('ra-notif-title');
            const notifMessage = document.getElementById('ra-notif-message');
            const notifGif = document.getElementById('ra-notif-gif');

            notifTitle.innerText = title;
            notifMessage.innerText = message;
            
            if (gifName) {
                notifGif.src = gifName;
                notifGif.style.display = 'block';
            } else {
                notifGif.style.display = 'none';
            }

            if (audioName) {
                const sound = new Audio(audioName);
                sound.play().catch(err => console.log("Audio playback failed:", err));
            }

            notifBox.classList.add('show-notif');

            setTimeout(() => {
                notifBox.classList.remove('show-notif');
            }, 5000); 
        }

        // Parallax Effect
        window.addEventListener('scroll', function() {
            const scrollPosition = window.pageYOffset;
            document.body.style.backgroundPositionY = -(scrollPosition * 0.3) + 'px';
        });

        // Fetch User Data & Auto-Check Owned Roles
        window.addEventListener('DOMContentLoaded', () => {
            fetch('https://api.radioanarchy.gg:8202/auth/me', {
                method: 'GET',
                credentials: 'include' 
            })
            .then(res => res.json())
            .then(data => {
                if (data.loggedIn) {
                    // Populate User Box
                    document.getElementById('user-profile-box').style.display = 'flex';
                    document.getElementById('user-name').innerText = data.displayUsername;
                    document.getElementById('user-avatar').src = data.displayAvatar || 'default-avatar.png';
                    
                    const rolesContainer = document.getElementById('user-roles-container');
                    rolesContainer.innerHTML = ''; 
                    
                    // Display Top 5 Roles in the Box
                    if (data.roles && data.roles.length > 0) {
                        const topRoles = data.roles.slice(0, 5);
                        topRoles.forEach(role => {
                            const badge = document.createElement('div');
                            badge.className = 'role-badge';
                            const roleColor = (role.color && role.color !== '#000000') ? role.color : '#00ffcc';
                            badge.style.borderLeftColor = roleColor;
                            badge.innerText = role.name;
                            rolesContainer.appendChild(badge);
                        });

                        // Auto-check the grid boxes for roles the user already has
                        const allCheckboxes = document.querySelectorAll('input[type="checkbox"]');
                        const userRoleIds = data.roles.map(r => r.id);
                        
                        allCheckboxes.forEach(checkbox => {
                            if (userRoleIds.includes(checkbox.value)) {
                                checkbox.checked = true;
                            }
                        });
                    } else {
                        rolesContainer.innerHTML = '<span style="color:#aaa; font-size:0.8rem;">No Clearances Assigned</span>';
                    }
                } else {
                    // If not logged in, boot them to home
                    window.location.href = 'index.html';
                }
            })
            .catch(err => console.error("Engine Error:", err));
        });

        // --- ACTIVE TRANSMITTER: SELECTABLE ROLES ---
        document.getElementById('form-selectable-roles').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Gather all checked boxes in the grid
            const checkboxes = document.querySelectorAll('#form-selectable-roles input[type="checkbox"]:checked');
            const selectedRoles = Array.from(checkboxes).map(cb => cb.value);

            try {
                const response = await fetch('https://api.radioanarchy.gg:8202/roles/update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ roles: selectedRoles })
                });

                const result = await response.json();
                
                if (response.ok) {
                    // Use custom pop-up with yessir.gif and NO sound
                    showNotification("TERMINAL UPDATED", "Your role choices have been modified.", "yessir.gif", "");
                    
                    // Delay the reload by 3 seconds so the user can see the GIF and message!
                    setTimeout(() => window.location.reload(), 3000); 
                } else {
                    showNotification("UPDATE FAILED", result.error, "silentsaysno.gif", "dennis_nerdy_ahahah.mp3");
                }
            } catch (err) {
                showNotification("CRITICAL ERROR", "Connection to the Secure Engine failed.", "silentsaysno.gif", "dennis_nerdy_ahahah.mp3");
            }
        });

        // --- ACTIVE TRANSMITTER: APPLICABLE ROLES ---
        document.getElementById('form-applicable-roles').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            const formData = new FormData(form);
            
            // Gather checked roles to send as a string
            const checkboxes = form.querySelectorAll('input[type="checkbox"]:checked');
            const selectedRoles = Array.from(checkboxes).map(cb => cb.nextElementSibling.innerText).join(', ');
            formData.append('roles', selectedRoles);

            try {
                const response = await fetch('https://api.radioanarchy.gg:8202/roles/apply', {
                    method: 'POST',
                    credentials: 'include',
                    body: formData
                });

                if (response.ok) {
                    showNotification("APPLICATION SUBMITTED", "Your application has been securely routed to High Command.", "emailsent.gif", "type.mp3");
                    form.reset(); // Clears the form after sending
                } else {
                    showNotification("TRANSMISSION FAILED", "Could not send application.", "silentsaysno.gif", "");
                }
            } catch (err) {
                showNotification("CRITICAL ERROR", "Connection to the Secure Engine failed.", "silentsaysno.gif", "");
            }
        });

        // --- ACTIVE TRANSMITTER: STAFF APPLICATIONS ---
        document.getElementById('form-staff').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            const formData = new FormData(form);
            
            const checkboxes = form.querySelectorAll('input[type="checkbox"]:checked');
            const selectedRoles = Array.from(checkboxes).map(cb => cb.nextElementSibling.innerText).join(', ');
            formData.append('roles', selectedRoles);

            try {
                const response = await fetch('https://api.radioanarchy.gg:8202/staff/apply', {
                    method: 'POST',
                    credentials: 'include',
                    body: formData
                });

                if (response.ok) {
                    showNotification("APPLICATION SUBMITTED", "Your application has been securely routed to High Command.", "emailsent.gif", "type.mp3");
                    form.reset();
                } else {
                    showNotification("TRANSMISSION FAILED", "Could not send application.", "silentsaysno.gif", "");
                }
            } catch (err) {
                showNotification("CRITICAL ERROR", "Connection to the Secure Engine failed.", "silentsaysno.gif", "");
            }
        });
    </script>
</body>
</html>
