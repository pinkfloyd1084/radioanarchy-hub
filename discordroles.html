<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Anarchy | Discord Roles</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        /* --- GLOBAL THEME --- */
        body {
            margin: 0;
            padding: 0;
            background: #050505 url('RadioAnarchyBackground.png') no-repeat center top fixed;
            background-size: cover;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            overflow-x: hidden;
            padding-bottom: 50px;
        }

        /* --- HEADER & COMMAND CENTER --- */
        .top-header-area {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 30px 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* --- UPDATED: PROFILE BOX WITH HOME BUTTON --- */
        #user-profile-box {
            background: rgba(15, 5, 10, 0.85);
            border: 2px solid #00ffcc;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
            display: flex;
            flex-direction: column;
            gap: 12px; /* Tighter vertical spacing */
            width: 320px;
            box-sizing: border-box;
            text-align: left;
            min-height: 220px; /* Slight height increase for new button */
        }

        .profile-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        #user-name {
            color: #fff;
            font-size: 1.3rem;
            font-weight: bold;
            text-shadow: 0 0 8px #fff;
            word-break: break-all;
            margin-right: 10px;
            margin-top: 5px;
        }

        #user-avatar {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            border: 2px solid #ff0055;
            object-fit: cover;
            flex-shrink: 0;
        }

        #user-roles-container {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 5px;
        }

        .role-badge {
            font-size: 0.85rem;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.6);
            padding: 5px 10px;
            border-radius: 4px;
            border-left: 4px solid #00ffcc; 
            color: #ddd;
            text-shadow: 0 0 5px rgba(255,255,255,0.3);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* The container for the internal Home button to center it */
        .profile-home-btn-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: 5px;
        }

        /* --- UPDATED: LOGO STACK SIZING --- */
        .logo-stack {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px; /* Redced to nearly zero, so they are "just touching" */
            flex-grow: 1;
            margin-right: 320px; /* Balances the flex space against the profile box */
            margin-top: 30px; /* Aligns visually with the profile box */
        }

        .main-discord-logo {
            width: 100%;
            max-width: 337px; /* 25% Smaller than 450px */
            filter: drop-shadow(0 0 15px rgba(88, 101, 242, 0.5));
        }

        .sub-discord-logo {
            width: 100%;
            max-width: 525px; /* 75% Bigger than 300px */
            filter: drop-shadow(0 0 10px #ff0055);
        }

        /* --- THEME CONTENT BOXES --- */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 50px;
            padding: 0 20px;
        }

        .theme-box {
            background: rgba(15, 5, 10, 0.85);
            border: 2px solid #ff0055;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 0 30px rgba(255, 0, 85, 0.2), inset 0 0 15px rgba(0, 0, 0, 0.8);
            text-align: left;
        }

        .box-header {
            color: #00ffcc;
            font-size: 1.8rem;
            letter-spacing: 3px;
            text-shadow: 0 0 10px #00ffcc;
            margin-top: 0;
            margin-bottom: 30px;
            border-bottom: 1px dashed #555;
            padding-bottom: 15px;
            text-align: center;
        }

        /* --- GRID & FORM LAYOUTS --- */
        .role-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.6);
            padding: 12px 15px;
            border-radius: 6px;
            border: 1px solid #333;
            transition: all 0.2s;
        }

        .checkbox-wrapper:hover {
            border-color: #00ffcc;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.2);
        }

        .checkbox-wrapper input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #ff0055;
        }

        .checkbox-wrapper label {
            color: #ddd;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 1px;
            user-select: none;
        }

        /* Form Inputs */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 25px;
        }

        .form-group label {
            color: #00ffcc;
            font-size: 1rem;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .form-input {
            background: rgba(0, 0, 0, 0.7);
            border: 1px dashed #555;
            color: #fff;
            padding: 15px;
            border-radius: 6px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        .form-input:focus {
            border-color: #00ffcc;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
        }

        input[type="file"].form-input {
            padding: 10px;
        }

        textarea.form-input {
            resize: vertical;
            min-height: 100px;
        }

        /* --- SUBMIT BUTTONS --- */
        .btn-right-align {
            display: flex;
            justify-content: flex-end;
            margin-top: 10px;
        }

        .btn-submit {
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            transition: transform 0.2s, filter 0.2s;
            outline: none;
        }

        .btn-submit img {
            width: 180px;
            display: block;
        }

        .btn-submit:hover {
            transform: translateY(-4px);
            filter: drop-shadow(0 0 15px #00ffcc);
        }

        .btn-submit:active {
            transform: scale(0.95);
        }

        /* --- UPDATED: BUTTON STYLING FOR BOTH HOME BUTTONS --- */
        .btn-home {
            width: 120px; /* The specified size */
            transition: transform 0.2s, filter 0.2s;
            cursor: pointer;
            display: block;
        }

        .btn-home:hover {
            transform: scale(1.1);
            filter: drop-shadow(0 0 15px #ff0055);
        }

        /* Shared button behavior, separate positioning for the lower button */
        .back-btn-wrapper {
            margin-top: 60px;
            display: flex;
            justify-content: center;
        }

        @media (max-width: 1000px) {
            .top-header-area { flex-direction: column; align-items: center; gap: 40px; }
            .logo-stack { margin-right: 0; }
        }
    </style>
</head>
<body>

    <div class="top-header-area">
        <div id="user-profile-box" style="display: none;">
            <div class="profile-header">
                <span id="user-name"></span>
                <img id="user-avatar" src="" alt="Anarchist Avatar">
            </div>
            <div id="user-roles-container"></div>
            
            <div class="profile-home-btn-container">
                <a href="index.html">
                    <img src="home.png" alt="Home" class="btn-home">
                </a>
            </div>
        </div>

        <div class="logo-stack">
            <img src="discordlogo.png" alt="Discord" class="main-discord-logo">
            <img src="discordroles.png" alt="Roles" class="sub-discord-logo">
        </div>
    </div>

    <div class="container">

        <div class="theme-box">
            <h2 class="box-header">SELECTABLE ROLES</h2>
            <form id="form-selectable-roles">
